<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="500" fill="#0b0e11" rx="12" />
  
  <!-- Top Nav -->
  <rect width="800" height="60" fill="#0e141a" />
  <line x1="0" y1="60" x2="800" y2="60" stroke="#1c252e" />
  <text x="30" y="38" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="18">AI Contract Analyzer</text>
  <text x="220" y="36" fill="#8899a6" font-family="sans-serif" font-size="12">Document Intelligence Platform</text>
  <rect x="650" y="15" width="120" height="30" rx="6" fill="#ca7d4d" fill-opacity="0.15" />
  <text x="710" y="34" fill="#f0b487" font-family="sans-serif" font-weight="bold" font-size="12" text-anchor="middle">Legal Audit Mode</text>
  
  <!-- Left Side: PDF Document Viewer Mockup -->
  <g transform="translate(30, 90)">
    <rect width="360" height="380" rx="8" fill="#141c24" stroke="#1c252e" />
    <rect x="0" y="0" width="360" height="40" fill="#0e141a" rx="8" />
    <text x="15" y="25" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="12">service_agreement_v2.pdf (Page 3 of 12)</text>
    
    <!-- PDF Text Lines -->
    <rect x="20" y="60" width="320" height="10" fill="#2c3a47" rx="2" />
    <rect x="20" y="80" width="280" height="10" fill="#2c3a47" rx="2" />
    
    <!-- Highlighted Text (Risk area) -->
    <rect x="20" y="105" width="320" height="40" fill="#ff4d4d" fill-opacity="0.15" rx="4" stroke="#ff4d4d" stroke-dasharray="2,2" />
    <text x="30" y="122" fill="#ff7675" font-family="sans-serif" font-size="10">"The service provider's total liability for any claims arising</text>
    <text x="30" y="137" fill="#ff7675" font-family="sans-serif" font-size="10">under this agreement shall be unlimited."</text>
    
    <rect x="20" y="160" width="320" height="10" fill="#2c3a47" rx="2" />
    <rect x="20" y="180" width="320" height="10" fill="#2c3a47" rx="2" />
    <rect x="20" y="200" width="180" height="10" fill="#2c3a47" rx="2" />
    
    <!-- Highlighted Text (Obligation area) -->
    <rect x="20" y="225" width="320" height="45" fill="#00bfff" fill-opacity="0.1" rx="4" stroke="#00bfff" stroke-dasharray="2,2" />
    <text x="30" y="242" fill="#81ecec" font-family="sans-serif" font-size="10">"Either party may terminate this agreement by providing</text>
    <text x="30" y="257" fill="#81ecec" font-family="sans-serif" font-size="10">at least 90 days written notice prior to renewal."</text>

    <rect x="20" y="285" width="320" height="10" fill="#2c3a47" rx="2" />
    <rect x="20" y="305" width="220" height="10" fill="#2c3a47" rx="2" />
  </g>

  <!-- Right Side: AI Analysis & Extraction Results -->
  <g transform="translate(420, 90)">
    <rect width="350" height="380" rx="8" fill="#0e141a" stroke="#1c252e" />
    
    <text x="20" y="30" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="14">AI Analysis Report</text>
    <text x="330" y="30" fill="#06c755" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="end">Audit Complete</text>
    <line x1="20" y1="45" x2="330" y2="45" stroke="#1c252e" />

    <!-- Analysis Highlights List -->
    <!-- Risk 1 -->
    <g transform="translate(20, 60)">
      <rect width="310" height="85" rx="8" fill="#141c24" stroke="#ff4d4d" stroke-opacity="0.3" />
      <circle cx="20" cy="22" r="8" fill="#ff4d4d" />
      <text x="20" y="25" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="9" text-anchor="middle">!</text>
      <text x="38" y="25" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="12">Unlimited Liability Clause</text>
      <text x="38" y="42" fill="#ff7675" font-family="sans-serif" font-size="11">Risk Level: HIGH RISK</text>
      <text x="38" y="58" fill="#8899a6" font-family="sans-serif" font-size="10">Provider liability is unlimited. Recommendation: Negotiate a</text>
      <text x="38" y="70" fill="#8899a6" font-family="sans-serif" font-size="10">liability cap matching the 12-month contract value.</text>
    </g>

    <!-- Obligation 1 -->
    <g transform="translate(20, 160)">
      <rect width="310" height="80" rx="8" fill="#141c24" stroke="#00bfff" stroke-opacity="0.3" />
      <circle cx="20" cy="22" r="8" fill="#00bfff" />
      <text x="20" y="25" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="8" text-anchor="middle">i</text>
      <text x="38" y="25" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="12">Notice Period obligation</text>
      <text x="38" y="42" fill="#81ecec" font-family="sans-serif" font-size="11">Notice Term: 90 Days</text>
      <text x="38" y="58" fill="#8899a6" font-family="sans-serif" font-size="10">Auto-renews if not terminated by April 12, 2026.</text>
      <text x="38" y="70" fill="#8899a6" font-family="sans-serif" font-size="10">Calendar alert created automatically.</text>
    </g>

    <!-- General Stats -->
    <g transform="translate(20, 255)">
      <rect width="310" height="105" rx="8" fill="#141c24" stroke="#1c252e" />
      <text x="15" y="25" fill="#8899a6" font-family="sans-serif" font-size="11">COMPLIANCE STATS</text>
      
      <!-- Compliance score dial mockup -->
      <circle cx="60" cy="65" r="22" fill="none" stroke="#2c3a47" stroke-width="6" />
      <circle cx="60" cy="65" r="22" fill="none" stroke="#f0b487" stroke-width="6" stroke-dasharray="100,38" transform="rotate(-90 60 65)" />
      <text x="60" y="69" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="11" text-anchor="middle">85%</text>
      
      <text x="110" y="55" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="12">Standard Alignment</text>
      <text x="110" y="72" fill="#8899a6" font-family="sans-serif" font-size="10">8 of 10 standard corporate policies met.</text>
      <text x="110" y="85" fill="#8899a6" font-family="sans-serif" font-size="10">Vector similarity score: 0.92 (High match)</text>
    </g>
  </g>
</svg>
