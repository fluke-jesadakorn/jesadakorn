<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="500" fill="#0b0e11" rx="12" />
  
  <!-- Sidebar -->
  <rect width="200" height="500" fill="#0e141a" />
  <line x1="200" y1="0" x2="200" y2="500" stroke="#1c252e" />
  
  <!-- Logo / Brand -->
  <text x="30" y="45" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="18">VIGNOLD HR</text>
  <text x="30" y="65" fill="#8899a6" font-family="sans-serif" font-size="11">Modern Workplace</text>
  
  <!-- Sidebar Menu -->
  <rect x="20" y="110" width="160" height="36" rx="8" fill="#1c252e" />
  <text x="40" y="132" fill="#f0b487" font-family="sans-serif" font-weight="bold" font-size="13">Pending Leave</text>
  
  <text x="40" y="182" fill="#8899a6" font-family="sans-serif" font-size="13">Leave Quotas</text>
  <text x="40" y="232" fill="#8899a6" font-family="sans-serif" font-size="13">Employee List</text>
  <text x="40" y="282" fill="#8899a6" font-family="sans-serif" font-size="13">n8n Workflows</text>
  <text x="40" y="332" fill="#8899a6" font-family="sans-serif" font-size="13">Ollama Settings</text>

  <!-- Header -->
  <rect x="200" y="0" width="600" height="80" fill="#0e141a" opacity="0.5" />
  <line x1="200" y1="80" x2="800" y2="80" stroke="#1c252e" />
  <text x="230" y="48" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="20">Leave Requests Queue</text>
  <rect x="680" y="25" width="90" height="30" rx="15" fill="#ca7d4d" fill-opacity="0.1" />
  <text x="725" y="44" fill="#f0b487" font-family="sans-serif" font-weight="bold" font-size="12" text-anchor="middle">HR Admin</text>

  <!-- Metrics Cards -->
  <g transform="translate(230, 100)">
    <!-- Card 1 -->
    <rect width="160" height="80" rx="8" fill="#0e141a" stroke="#1c252e" />
    <text x="20" y="30" fill="#8899a6" font-family="sans-serif" font-size="11">PENDING APPROVAL</text>
    <text x="20" y="60" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="24">1 Request</text>

    <!-- Card 2 -->
    <rect x="180" width="160" height="80" rx="8" fill="#0e141a" stroke="#1c252e" />
    <text x="200" y="30" fill="#8899a6" font-family="sans-serif" font-size="11">APPROVED TODAY</text>
    <text x="200" y="60" fill="#06c755" font-family="sans-serif" font-weight="bold" font-size="24">12 Leaves</text>

    <!-- Card 3 -->
    <rect x="360" width="180" height="80" rx="8" fill="#0e141a" stroke="#1c252e" />
    <text x="380" y="30" fill="#8899a6" font-family="sans-serif" font-size="11">OLLAMA MODEL STATUS</text>
    <text x="380" y="60" fill="#00bfff" font-family="sans-serif" font-weight="bold" font-size="18">Qwen 2.5 Active</text>
  </g>

  <!-- Requests Table/List -->
  <g transform="translate(230, 205)">
    <text x="0" y="20" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="15">Active Request</text>
    
    <!-- Table Container -->
    <rect y="35" width="540" height="230" rx="8" fill="#0e141a" stroke="#1c252e" />
    
    <!-- Table Header -->
    <rect y="35" width="540" height="35" fill="#141c24" rx="8" />
    <text x="15" y="57" fill="#8899a6" font-family="sans-serif" font-size="11">EMPLOYEE</text>
    <text x="150" y="57" fill="#8899a6" font-family="sans-serif" font-size="11">LEAVE DETAILS</text>
    <text x="300" y="57" fill="#8899a6" font-family="sans-serif" font-size="11">AI OLLAMA CONFIDENCE</text>
    <text x="440" y="57" fill="#8899a6" font-family="sans-serif" font-size="11" text-anchor="middle">ACTION</text>
    
    <!-- Row 1 -->
    <g transform="translate(0, 70)">
      <circle cx="25" cy="40" r="14" fill="#f0b487" />
      <text x="25" y="44" fill="#0b0e11" font-family="sans-serif" font-weight="bold" font-size="10" text-anchor="middle">JK</text>
      <text x="50" y="38" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="12">Jesadakorn Kirtnu</text>
      <text x="50" y="52" fill="#8899a6" font-family="sans-serif" font-size="10">Phuket Branch</text>
      
      <text x="150" y="38" fill="#ffffff" font-family="sans-serif" font-size="12">Personal Leave (ลากิจ)</text>
      <text x="150" y="52" fill="#8899a6" font-family="sans-serif" font-size="11">5 July (1 day) - Family Business</text>
      
      <!-- LLM extracted confidence -->
      <rect x="300" y="28" width="80" height="18" rx="4" fill="#06c755" fill-opacity="0.2" />
      <text x="340" y="41" fill="#06c755" font-family="sans-serif" font-weight="bold" font-size="10" text-anchor="middle">98.5% Intent</text>
      
      <!-- Actions -->
      <rect x="400" y="25" width="60" height="26" rx="13" fill="#06c755" />
      <text x="430" y="42" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="11" text-anchor="middle">Approve</text>
      
      <rect x="470" y="25" width="55" height="26" rx="13" fill="#ff4d4d" fill-opacity="0.1" stroke="#ff4d4d" stroke-width="1" />
      <text x="497" y="41" fill="#ff4d4d" font-family="sans-serif" font-weight="bold" font-size="11" text-anchor="middle">Reject</text>
    </g>
    
    <!-- n8n integration status bar at bottom of table -->
    <rect y="170" width="540" height="60" fill="#141c24" rx="8" />
    <path d="M 15 190 H 25 A 5 5 0 0 1 30 195 V 205 A 5 5 0 0 1 25 210 H 15 Z" fill="#ff6d5a" />
    <text x="40" y="200" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="11">n8n Execution Pipeline Active</text>
    <text x="40" y="215" fill="#8899a6" font-family="sans-serif" font-size="10">State Machine ID: leave-flow-v3. Slot filling: completed. Next node: Wait for admin click.</text>
  </g>
</svg>
